[tox]
envlist = check-manifest,docs,flake8,py

[testenv]
deps =
    pytest
    pytest-cov
    setuptools < 81
commands =
    py.test --basetemp={envtmpdir} --cov=mopidy_internetarchive --cov-report term-missing {posargs}
sitepackages = true

[testenv:check-manifest]
deps =
    check-manifest
commands =
    check-manifest
skip_install = true

[testenv:docs]
deps =
     sphinx
commands =
     sphinx-build -W -b html -d {envtmpdir}/doctrees docs {envtmpdir}/html

[testenv:flake8]
deps =
    flake8
    flake8-black
    flake8-bugbear
    flake8-import-order
    flake8-pyproject
commands =
    flake8
skip_install = true
